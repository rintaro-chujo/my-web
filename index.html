<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rintaro Chujo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="site-name">RINTARO CHUJO</span>
    </div>
    <div class="top-bar-right">
      <button id="lang-en" class="lang-btn active">EN</button>
      <span class="lang-sep">|</span>
      <button id="lang-ja" class="lang-btn">JP</button>
    </div>
  </header>

  <main class="content">
    <section id="profile" class="section">
      <div class="profile-header">
        <img id="profile-photo" src="assets/profile.jpg" alt="Rintaro Chujo" class="profile-photo">
        <div class="profile-info">
          <h1 id="profile-name"></h1>
          <p id="profile-bio" class="bio"></p>
          <h2 data-en="Contact" data-ja="連絡先">Contact</h2>
          <div id="profile-contact" class="contact"></div>
        </div>
      </div>
    </section>

    <section id="education" class="section">
      <h2 data-en="Education" data-ja="学歴">Education</h2>
      <div id="education-list"></div>
    </section>

    <section id="experience" class="section">
      <h2 data-en="Academic and Work Experience" data-ja="研究・職歴">Academic and Work Experience</h2>
      <div id="experience-list"></div>
    </section>

    <section id="grants" class="section">
      <h2 data-en="Grants and Honors" data-ja="受賞・助成">Grants and Honors</h2>
      <div id="grants-list"></div>
    </section>

    <section id="publications" class="section">
      <h2 data-en="Publications" data-ja="業績一覧">Publications</h2>
      <div id="publications-list"></div>
    </section>

    <section id="service" class="section">
      <h2 data-en="Academic Service" data-ja="学術活動">Academic Service</h2>
      <div id="service-content"></div>
    </section>

    <section id="media" class="section">
      <h2 data-en="Media Coverage" data-ja="メディア掲載">Media Coverage</h2>
      <div id="media-list"></div>
    </section>
  </main>

  <script src="js/main.js?v=2"></script>
</body>
</html>
